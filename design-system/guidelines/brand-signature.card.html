<!-- @dsCard group="Brand" viewport="700x180" name="Two signature moves" subtitle="Plasma on the main action; ledger labels for on-chain texture" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; }
  .panel { border:1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); max-width: 320px; }
  .lab { color: var(--muted-foreground); margin: 0 0 6px; }
  .val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 24px; font-weight: 600; }
  .val .dim { color: color-mix(in oklab, var(--muted-foreground) 60%, transparent); }
  .btn { margin-top: 16px; display:inline-flex; align-items:center; height: 36px; padding: 0 18px; border-radius: var(--radius-md); color: var(--primary-foreground); font-family: var(--font-sans); font-weight: 600; font-size: 14px; box-shadow: var(--shadow-sm); }
</style></head>
<body>
  <div class="panel">
    <p class="lab text-ledger">Available to send</p>
    <div class="val">6,223.855<span class="dim">48</span> ZNN</div>
    <div class="btn bg-plasma">Send</div>
  </div>
</body></html>
