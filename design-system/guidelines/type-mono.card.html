<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; }
  .ledger { margin: 0 0 14px; color: var(--muted-foreground); }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 15px; margin: 0 0 10px; }

  .unit { color: var(--muted-foreground); font-size: 18px; }
</style></head>
<body>
