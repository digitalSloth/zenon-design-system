<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="Tight — echoes the angular Z (base ~6px)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 64px; height: 64px; background: var(--accent); border: 1px solid var(--primary); }
  .name { font-family: var(--font-mono); font-size: 11px; margin-top: 8px; color: var(--muted-foreground); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm · 2px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md · 4px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg · 6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl · 10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full)"></div><div class="name">full</div></div>
  </div>
</body></html>
