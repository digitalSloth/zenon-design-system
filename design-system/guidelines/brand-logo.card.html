<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; display:flex; gap:36px; align-items:center; }
  .panel { flex:1; display:flex; align-items:center; gap:16px; padding:20px 24px; border-radius:var(--radius-lg); border:1px solid var(--border); }
  .dark-panel { background: var(--zenon-black); }
  .word { font-family: var(--font-sans); font-weight: 700; font-size: 26px; letter-spacing: -.01em; }
  .dark-panel .word { color: #fff; }
  .light-panel .word { color: var(--zenon-black); }
  img { height: 46px; }
</style></head>
<body>
  <div class="panel light-panel">
    <img src="../assets/znn-logo.svg" alt="ZNN" />
    <span class="word">Zenon</span>
  </div>
  <div class="panel dark-panel">
    <img src="../assets/znn-logo.svg" alt="ZNN" />
    <span class="word">Zenon</span>
  </div>
</body></html>
