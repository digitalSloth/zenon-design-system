<!-- @dsCard group="Colors" viewport="700x150" name="Brand tri-color" subtitle="Green leads; blue & pink by role; near-black base" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--zenon-green)"></div><div class="meta"><div class="name">zenon-green</div><div class="hex">#00D557 · primary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zenon-blue)"></div><div class="meta"><div class="name">zenon-blue</div><div class="hex">#0061EB · info</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zenon-pink)"></div><div class="meta"><div class="name">zenon-pink</div><div class="hex">#F91690 · accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zenon-black)"></div><div class="meta"><div class="name">zenon-black</div><div class="hex">#151515 · base</div></div></div>
  </div>
</body></html>
