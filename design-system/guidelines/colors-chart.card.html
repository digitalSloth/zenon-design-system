<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
  .seg { flex: 1; height: 60px; display:flex; align-items:flex-end; padding:8px; }
  .seg span { font-family: var(--font-mono); font-size: 10px; color: #fff; mix-blend-mode: difference; }
</style></head>
<body>
  <div class="row">
    <div class="seg" style="background:var(--chart-1)"><span>chart-1</span></div>
    <div class="seg" style="background:var(--chart-2)"><span>chart-2</span></div>
    <div class="seg" style="background:var(--chart-3)"><span>chart-3</span></div>
    <div class="seg" style="background:var(--chart-4)"><span>chart-4</span></div>
    <div class="seg" style="background:var(--chart-5)"><span>chart-5</span></div>
  </div>
</body></html>
