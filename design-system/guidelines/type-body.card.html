<!-- @dsCard group="Type" viewport="700x210" name="Body & supporting text" subtitle="lead · default · large · small · muted" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; font-family: var(--font-sans); }
  .b { margin: 0 0 12px; }
  .lead { font-size: var(--text-lead); color: var(--muted-foreground); }
  .def { font-size: var(--text-base); line-height: var(--leading-relaxed); }
  .large { font-size: var(--text-large); font-weight: 600; }
  .small { font-size: var(--text-sm); font-weight: 500; }
  .muted { font-size: var(--text-sm); color: var(--muted-foreground); }
</style></head>
<body>
  <p class="b lead">A self-evolving network, globally deployed to shape digital economies of scale.</p>
  <p class="b def">Balances, amounts, fees and hashes are what users came for — treat them as first-class, never as ordinary text.</p>
  <p class="b large">Large — section emphasis</p>
  <p class="b small">Small — dense label / table cell</p>
  <p class="b muted">Muted — captions and secondary metadata</p>
</body></html>
