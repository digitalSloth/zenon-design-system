<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="styles.css" />
<style>
  body { margin:0; background:#101010; color:#eee; font-family:var(--font-sans); padding:30px 40px; }
  h2 { font-size:14px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.06em; color:#7a7a7a; margin:26px 0 12px; }
  .strip { display:flex; gap:0; border:1px solid #262626; border-radius:10px; overflow:hidden; width:max-content; }
  .cell { padding:18px 22px; border-right:1px solid #1d1d1d; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .cell:last-child { border-right:none; }
  .cap { font-family:var(--font-mono); font-size:11px; color:#8a8a8a; }
  .cap b { color:#fff; display:block; font-size:12px; }
  .big { color:#00d557; }
  .lil { color:#00d557; }
  .orig { color:#cfcfcf; }
  svg { display:block; }
</style></head>
<body>
<script>
const S = 'stroke="currentColor" stroke-width="2.2" stroke-linejoin="miter" stroke-linecap="butt" fill="none"';
const SF = 'fill="currentColor"';

const G = {
  // tower of sauron — tall tiered/stepped spire
  pillarTower: `<path d="M12 2 L14.5 6 L14.5 8 L13 8 L13.6 11 L15 11 L15 13 L13.9 13 L15 18 L16.5 18 L16.5 21.5 L7.5 21.5 L7.5 18 L9 18 L10.1 13 L9 13 L9 11 L10.4 11 L11 8 L9.5 8 L9.5 6 Z" ${S}/><path d="M12 3.5 L12 7" ${S}/>`,
  // alt tower: slimmer with eye-slit
  pillarTower2: `<path d="M9 21.5 L10.2 5 L12 2 L13.8 5 L15 21.5 Z" ${S}/><path d="M9.6 13 H14.4" ${S}/><path d="M9.9 9 H14.1" ${S}/><path d="M7.5 21.5 H16.5" ${S}/><path d="M12 6.5 L12.8 8 L12 9 L11.2 8 Z" ${SF}/>`,
  plasmaBolt: `<path d="M14 2 L6 13 L11 13 L10 22 L18 10.5 L13 10.5 Z" ${S}/>`,
  plasmaFlame: `<path d="M12 2 L16 9 L13.5 11.5 L15.5 16 L12 21.5 L8.5 16 L11 11.5 L8 9 Z" ${S}/>`,
};

const svg = (body, sz) => `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24">${body}</svg>`;

document.body.insertAdjacentHTML("beforeend", `
<h2>Pillar — tower direction</h2>
<div class="strip">
  <div class="cell"><div class="orig" id="origPillar"></div><div class="cap"><b>original</b>stacked chevron</div></div>
  <div class="cell"><div class="big">${svg(G.pillarTower,44)}</div><div class="cap"><b>tower A</b>tiered spire @44</div></div>
  <div class="cell"><div class="lil">${svg(G.pillarTower,22)}</div><div class="cap">@22</div></div>
  <div class="cell"><div class="big">${svg(G.pillarTower2,44)}</div><div class="cap"><b>tower B</b>spire + slit @44</div></div>
  <div class="cell"><div class="lil">${svg(G.pillarTower2,22)}</div><div class="cap">@22</div></div>
</div>

<h2>Plasma — rethink</h2>
<div class="strip">
  <div class="cell"><div class="big">${svg(G.plasmaBolt,44)}</div><div class="cap"><b>A · bolt</b>energy · rhymes w/ Z @44</div></div>
  <div class="cell"><div class="lil">${svg(G.plasmaBolt,22)}</div><div class="cap">@22</div></div>
  <div class="cell"><div class="big">${svg(G.plasmaFlame,44)}</div><div class="cap"><b>B · flame</b>single tongue @44</div></div>
  <div class="cell"><div class="lil">${svg(G.plasmaFlame,22)}</div><div class="cap">@22</div></div>
</div>
`);

// load original pillar
fetch("assets/glyphs/pillar.svg").then(r=>r.text()).then(t=>{
  document.getElementById("origPillar").innerHTML = t.replace("<svg",'<svg width="44" height="44"');
});
</script>
</body></html>
