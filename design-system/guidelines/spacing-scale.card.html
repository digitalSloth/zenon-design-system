<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; }
  .item { display:flex; align-items:center; gap:14px; margin-bottom:7px; }
  .bar { height: 14px; background: var(--primary); border-radius: 2px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); width: 110px; }
</style></head>
<body>
  <div class="item"><span class="name">space-1 · 4</span><span class="bar" style="width:var(--space-1)"></span></div>
  <div class="item"><span class="name">space-2 · 8</span><span class="bar" style="width:var(--space-2)"></span></div>
  <div class="item"><span class="name">space-3 · 12</span><span class="bar" style="width:var(--space-3)"></span></div>
  <div class="item"><span class="name">space-4 · 16</span><span class="bar" style="width:var(--space-4)"></span></div>
  <div class="item"><span class="name">space-6 · 24</span><span class="bar" style="width:var(--space-6)"></span></div>
  <div class="item"><span class="name">space-8 · 32</span><span class="bar" style="width:var(--space-8)"></span></div>
  <div class="item"><span class="name">space-12 · 48</span><span class="bar" style="width:var(--space-12)"></span></div>
</body></html>
