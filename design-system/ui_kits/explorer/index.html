<!-- @startingPoint section="Explorer" subtitle="Zenon block explorer — stats, momentums & tx feed" viewport="1200x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Zenon Explorer — Network of Momentum</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--background); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="ExplorerIcons.jsx"></script>
<script type="text/babel" src="ExplorerData.jsx"></script>
<script type="text/babel" src="ExplorerChrome.jsx"></script>
<script type="text/babel" src="ExplorerScreens.jsx"></script>
<script type="text/babel">
function App() {
  const [tab, setTab] = React.useState("Momentums");
  return (
    <div style={{ minHeight: "100vh" }}>
      <ExplorerHeader tab={tab} onTab={setTab} />
      <main style={{ maxWidth: 1180, margin: "0 auto", padding: "24px 28px 60px" }}>
        <StatStrip />
        {tab === "Momentums" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
            <MomentumsPanel />
            <TransactionsPanel />
          </div>
        )}
        {tab === "Transactions" && <TransactionsPanel />}
        {tab === "Tokens" && <TokensPanel />}
        {tab === "Pillars" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
            <MomentumsPanel />
            <TokensPanel />
          </div>
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
